<!DOCTYPE html>
<html>
<head>
    <title>Factory Downtime Tracker</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1E3A8A;
            color: white;
            padding: 20px;
        }
        .branding {
            text-align: center;
            font-size: 26px;
            font-weight: 900;
            font-family: 'Poppins', 'Arial Black', 'Segoe UI Black', sans-serif;
            color: #FFD700;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(255,215,0,0.5);
        }
        h1 {
            text-align: center;
            font-size: 38px;
            margin: 0 0 10px 0;
        }
        .status-badge {
            background: #e67e22;
            color: black;
            padding: 12px;
            border-radius: 40px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
        .loss-card {
            background: #d63031;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        .loss-amount {
            font-size: 56px;
            font-weight: bold;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }
        button {
            cursor: pointer;
            position: relative;
            z-index: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            transition: 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .global-reset-btn {
            background: #d63031;
            color: white;
        }
        .export-btn {
            background: #00b894;
            color: white;
        }
        .machines-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }
        .machine {
            background: #0f2b5e;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            transition: 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .machine.stopped {
            border: 3px solid #d63031;
            background: #2c1a1a;
        }
        .machine.running {
            border: 3px solid #00b894;
        }
        .machine strong {
            font-size: 26px;
            display: block;
            margin-bottom: 10px;
        }
        .status {
            font-size: 24px;
            font-weight: bold;
            margin: 12px 0;
        }
        .running .status { color: #00e6b8; }
        .stopped .status { color: #ff7675; }
        .cause {
            font-size: 18px;
            color: #ffaa88;
            margin: 8px 0;
        }
        .timestamp {
            font-size: 16px;
            color: #f39c12;
            margin: 5px 0;
        }
        .loss-small {
            font-size: 18px;
            font-weight: bold;
            color: #ff7675;
            margin-top: 8px;
        }
        .machine-reset-btn {
            background: #ffaa33;
            color: #1a1a2e;
            border: none;
            padding: 12px;
            margin-top: 15px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 16px;
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="branding">🔧 M.M.Consultant</div>
    <h1>🏭 FACTORY DOWNTIME TRACKER</h1>
    
    <div class="status-badge">
        📡 LIVE UPDATES EVERY 3 SECONDS | SPEAK MACHINE NAME OR NUMBER
    </div>
    
    <div class="loss-card">
        <div style="font-size: 22px;">💰 TODAY'S TOTAL LOSS</div>
        <div class="loss-amount" id="totalLoss">₹0</div>
    </div>
    
    <div class="button-group">
        <button class="global-reset-btn" onclick="resetAllMachines()">🗑️ RESET ALL MACHINES</button>
        <button class="export-btn" onclick="exportToExcel()">📊 EXPORT TO EXCEL</button>
    </div>
    
    <div class="machines-grid" id="machinesGrid"></div>
    
    <div class="footer">
        Last updated: <span id="timestamp"></span>
    </div>

    <script>
        const machines = [
            { id: 1, displayName: "CNC Machine", status: "running", cause: null, hourlyCost: 8000, reportedAt: null },
            { id: 2, displayName: "Lathe Machine", status: "running", cause: null, hourlyCost: 6000, reportedAt: null },
            { id: 3, displayName: "Grinder", status: "running", cause: null, hourlyCost: 4000, reportedAt: null }
        ];
        
        function calculateTotalLoss() {
            let total = 0;
            machines.forEach(m => { if (m.status === "stopped") total += m.hourlyCost; });
            return total;
        }
        
        function updateDashboard() {
            const grid = document.getElementById('machinesGrid');
            const totalLoss = calculateTotalLoss();
            document.getElementById('totalLoss').innerHTML = `₹${totalLoss.toLocaleString()}`;
            document.getElementById('timestamp').innerHTML = new Date().toLocaleTimeString();
            
            let html = '';
            machines.forEach(m => {
                const statusClass = m.status;
                const statusIcon = m.status === 'running' ? '🟢' : '🔴';
                const statusText = m.status === 'running' ? 'RUNNING' : 'STOPPED';
                let causeHtml = '', lossHtml = '', timeHtml = '';
                if (m.status === 'stopped') {
                    causeHtml = `<div class="cause">⚠️ CAUSE: ${m.cause}</div>`;
                    lossHtml = `<div class="loss-small">💰 LOSS: ₹${m.hourlyCost.toLocaleString()}/hour</div>`;
                    if (m.reportedAt) {
                        timeHtml = `<div class="timestamp">🕒 REPORTED AT: ${m.reportedAt}</div>`;
                    }
                }
                html += `
                    <div class="machine ${statusClass}">
                        <div>
                            <strong>${m.displayName}</strong>
                            <div class="status">${statusIcon} ${statusText}</div>
                            ${causeHtml}
                            ${timeHtml}
                            ${lossHtml}
                        </div>
                        <button class="machine-reset-btn" onclick="resetMachine('${m.displayName}')">🔧 RESET ${m.displayName.toUpperCase()}</button>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }
        
        function resetAllMachines() {
            fetch('/reset')
                .then(() => {
                    machines.forEach(m => {
                        m.status = "running";
                        m.cause = null;
                        m.reportedAt = null;
                    });
                    updateDashboard();
                })
                .catch(err => console.log("Reset error:", err));
        }
        
        function resetMachine(machineName) {
            fetch('/reset_machine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ machine: machineName })
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return response.json();
            })
            .then(data => {
                const machine = machines.find(m => m.displayName === machineName);
                if (machine) {
                    machine.status = "running";
                    machine.cause = null;
                    machine.reportedAt = null;
                }
                updateDashboard();
            })
            .catch(err => {
                console.error("Reset machine error:", err);
                alert(`Failed to reset ${machineName}: ${err.message}`);
            });
        }
        
        function loadDowntimeEvents() {
            fetch('/get_events')
                .then(response => response.json())
                .then(data => {
                    if (data.events && data.events.length > 0) {
                        machines.forEach(m => {
                            m.status = "running";
                            m.cause = null;
                            m.reportedAt = null;
                        });
                        data.events.forEach(event => {
                            const machine = machines.find(m => m.displayName === event.machine);
                            if (machine) {
                                machine.status = "stopped";
                                machine.cause = event.cause;
                                machine.reportedAt = event.timestamp;
                            }
                        });
                        updateDashboard();
                    }
                })
                .catch(err => console.log("Server error:", err));
        }
        
        function exportToExcel() {
            fetch('/export')
                .then(response => {
                    if (!response.ok) throw new Error('Export failed');
                    return response.blob();
                })
                .then(blob => {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'downtime_report.csv';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                })
                .catch(err => console.error('Export error:', err));
        }
        
        updateDashboard();
        setInterval(loadDowntimeEvents, 3000);
        loadDowntimeEvents();
    </script>
</body>
</html>
